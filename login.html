<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Book Store Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .OBSS-container {
            background: rgb(255, 255, 255);
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 400px;
            padding: 40px;
        }
        
        .OBSS-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .OBSS-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .OBSS-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
    </style>
</head>
<body>
    <div class="OBSS-container">
        <div class="OBSS-header">
            <h1>OBSS System</h1>
            <p>Welcome to the Online Book Store System</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <div>
                <label for="num">Input CardNumber:</label>
                <input 
                    type="text"
                    id="num"
                    name="num"
                    placeholder="Example@gmail.com" 
                    required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password:</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your pawssword"
                    maxlength="10"
                    required
                >
            </div>
            
            <div>
            <a href = "menu.html"
                input type="submit" class=btn-submit value="Login">
                Login
            </div>
        </form>
    </div>
</body>
</html>
