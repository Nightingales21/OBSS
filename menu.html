<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSS - Main Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .OBSS-container {
            background: rgb(255, 255, 255);
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 400px;
            padding: 40px;
        }
        
        .OBSS-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .OBSS-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .OBSS-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
    </style>
</head>
<body>
    <div class="OBSS-container">
        <div class="OBSS-header">
            <h1>OBSS Main Menu</h1>
            <p>Select your books</p>
        </div>

        <div class="customer-info">
            <p><strong>Account Holder:</strong> John Doe</p>
            <p><strong>Last Transaction:</strong> 2 hours ago</p>
        </div>

        <br>
        
        <form action = "Payment.html" method="get">
            <div>   
                <label for="Lord of the rings">Lord Of the Rings: </label>
                <input type="checkbox" id="Lord Of the Rings" name="Lord Of the Rings">
            </div>
            <br>
            <div>   
                <label for="Percy Jackson">Percy Jackson: </label>
                <input type="checkbox" id="Percy Jackson" name="Percy Jackson">
            </div>
            <br>
            <div>   
                <label for="Harry Potter">Harry Potter: </label>
                <input type="checkbox" id="Harry Potter" name="Harry Potter">
            </div>
        </form>

        <br>

        <div>
            <a href = "payment.html">
                <input type="submit" value="Submit">
            </a>
            </div>

        <div class="timer">
            ⏱️ Session will expire in: <span id="timer">02:00</span>
        </div>
    </div>
    
    <script>
        let timeLeft = 120; 
        
        setInterval(function() {
            if (timeLeft > 0) {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                document.getElementById('timer').textContent = 
                    (minutes < 10 ? '0' : '') + minutes + ':' + 
                    (seconds < 10 ? '0' : '') + seconds;
            } else {
                alert('Session expired! Your card will be retained.');
                logout();
            }
        }, 1000);
    </script>
</body>
</html>
